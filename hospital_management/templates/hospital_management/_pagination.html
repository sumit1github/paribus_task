{% if pagination.total_pages > 1 %}
<nav class="mt-3 d-flex align-items-center justify-content-between">
  <div class="text-muted small">
    Showing page {{ pagination.page }} of {{ pagination.total_pages }} ({{ pagination.total_items }} total)
  </div>
  <ul class="pagination pagination-sm mb-0">
    <li class="page-item {% if not pagination.has_previous %}disabled{% endif %}">
      <a class="page-link"
         href="?page={{ pagination.previous_page }}{% if q %}&q={{ q }}{% endif %}{% if batch_id %}&batch_id={{ batch_id }}{% endif %}"
         hx-get="{% url 'hospital_management:list' %}?page={{ pagination.previous_page }}{% if q %}&q={{ q }}{% endif %}{% if batch_id %}&batch_id={{ batch_id }}{% endif %}"
         hx-target="#hospital-list-region"
         hx-swap="innerHTML"
         hx-push-url="true">
        <i class="fa-solid fa-chevron-left"></i> Prev
      </a>
    </li>
    <li class="page-item disabled">
      <span class="page-link">{{ pagination.page }} / {{ pagination.total_pages }}</span>
    </li>
    <li class="page-item {% if not pagination.has_next %}disabled{% endif %}">
      <a class="page-link"
         href="?page={{ pagination.next_page }}{% if q %}&q={{ q }}{% endif %}{% if batch_id %}&batch_id={{ batch_id }}{% endif %}"
         hx-get="{% url 'hospital_management:list' %}?page={{ pagination.next_page }}{% if q %}&q={{ q }}{% endif %}{% if batch_id %}&batch_id={{ batch_id }}{% endif %}"
         hx-target="#hospital-list-region"
         hx-swap="innerHTML"
         hx-push-url="true">
        Next <i class="fa-solid fa-chevron-right"></i>
      </a>
    </li>
  </ul>
</nav>
{% endif %}
